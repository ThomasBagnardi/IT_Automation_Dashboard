[alembic]
# path to migration scripts (relative to this file)
script_location = alembic

# placeholder; env.py below will override using app.database.DATABASE_URL
sqlalchemy.url = sqlite:///./it_automation.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s